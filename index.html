<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Personnelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-dark: #1a1a1a;
            --text-muted: #888888;
            --soft-gray: #f5f5f5;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 25px;
        }

        header {
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 42px;
            font-weight: 400;
            letter-spacing: -0.03em;
        }

        .list {
            display: flex;
            flex-direction: column;
        }

        .item {
            padding: 30px 0;
            border-bottom: 1px solid var(--soft-gray);
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.6s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .item-header {
            margin-bottom: 0;
        }

        .item-number {
            font-family: 'Bodoni Moda', serif;
            font-size: 13px;
            font-style: italic;
            color: var(--text-muted);
            display: block;
            margin-bottom: 4px;
        }

        .item-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .links-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .shop-link {
            font-size: 10px;
            text-decoration: none;
            color: var(--text-dark);
            border: 1px solid #e0e0e0;
            padding: 5px 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: var(--transition);
            border-radius: 2px;
        }

        .shop-link:active {
            background-color: var(--text-dark);
            color: white;
            border-color: var(--text-dark);
        }

        footer {
            margin-top: 60px;
            padding-top: 30px;
        }

        .footer-note {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Délais d'affichage */
        .item:nth-child(1) { animation-delay: 0.1s; }
        .item:nth-child(2) { animation-delay: 0.2s; }
        .item:nth-child(3) { animation-delay: 0.3s; }
        .item:nth-child(4) { animation-delay: 0.4s; }
        .item:nth-child(5) { animation-delay: 0.5s; }

        @media (max-width: 480px) {
            .container { padding: 50px 20px; }
            h1 { font-size: 36px; }
            .item-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sélection</h1>
        </header>

        <div class="list">
            
            <!-- 01 Barre de Traction -->
            <div class="item">
                <span class="item-number">01</span>
                <div class="item-header">
                    <h2 class="item-title">Barre/station de traction</h2>
                </div>
                <div class="links-container">
                    <a href="https://www.decathlon.fr/tous-les-sports/musculation-cross-training/barres-de-traction" target="_blank" class="shop-link">Decathlon</a>
                </div>
            </div>

            <!-- 02 Chaussures -->
            <div class="item">
                <span class="item-number">02</span>
                <div class="item-header">
                    <h2 class="item-title">Chaussures</h2>
                </div>
                <div class="links-container">
                    <a href="https://www.nike.com/fr/w?q=p-6000" target="_blank" class="shop-link">Nike P-6000</a>
                    <a href="https://emea.mizuno.com/eu/fr-fr/sportstyle/sneakers/homme/" target="_blank" class="shop-link">Mizuno MXR/Wave rider 10</a>
                    <a href="https://www.saucony.com/FR/fr_FR/search?q=ride+millennium" target="_blank" class="shop-link">Saucony Ride</a>
                    <a href="https://www.courir.com/fr/c/marques/new-balance/2002r/" target="_blank" class="shop-link">NB 2002R</a>
                </div>
            </div>

            <!-- 03 Écouteurs -->
            <div class="item">
                <span class="item-number">03</span>
                <div class="item-header">
                    <h2 class="item-title">Écouteurs sans fils</h2>
                </div>
                <div class="links-container">
                    <a href="https://fr.nothing.tech/products/ear?Couleur=Blanc" target="_blank" class="shop-link">Nothing Ear</a>
                </div>
            </div>

            <!-- 04 SSD -->
            <div class="item">
                <span class="item-number">04</span>
                <div class="item-header">
                    <h2 class="item-title">SSD</h2>
                </div>
            </div>

            <!-- 05 Lit -->
            <div class="item">
                <span class="item-number">05</span>
                <div class="item-header">
                    <h2 class="item-title">Lit</h2>
                </div>
            </div>

        </div>

        <footer>
            <p class="footer-note">Pourquoi pas: Tapis de souris</p>
            <div class="links-container">
                <a href="https://www.ikea.com/fr/fr/p/susig-sous-main-liege-90457486/" target="_blank" class="shop-link">Sous-main IKEA</a>
            </div>
        </footer>
    </div>
</body>
</html>
